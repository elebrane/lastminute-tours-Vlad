kind = "web"
previewPath = "/"
title = "LastMinute Tours"
version = "1.0.0"
id = "artifacts/lastminute"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18377
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/lastminute run dev"

[services.env]
PORT = "18377"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/lastminute", "run", "build"]
publicDir = "artifacts/lastminute/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
